appId: com.geraldy.macrozone
---
- launchApp
- extendedWaitUntil:
    visible: "Bienvenue|Welcome|nutriFlow"
    timeout: 20000
- runFlow:
    when:
      visible: "Continuer en tant qu'invité|Continue as guest"
    commands:
      - tapOn:
          id: "welcome-guest-btn"
- extendedWaitUntil:
    visible: "nutriFlow|Recent Meals|Repas récents"
    timeout: 20000
- tapOn:
    id: "profile-tab"
- tapOn:
    id: "open-settings-btn"
- tapOn:
    id: "language-fr"
- tapOn:
    id: "home-tab"
- assertVisible: "Accueil"
- tapOn:
    id: "profile-tab"
- tapOn:
    id: "open-settings-btn"
- tapOn:
    id: "language-en"
- tapOn:
    id: "home-tab"
- assertVisible: "Home"