appId: com.geraldy.macrozone
---
- launchApp
- extendedWaitUntil:
    visible: "nutriFlow|MacroZone|Recent Meals|Repas récents"
    timeout: 20000
- tapOn:
    id: "settings-tab"
- tapOn:
    id: "language-fr"
- tapOn:
    id: "home-tab"
- assertVisible: "Repas récents|Progression du jour"
- tapOn:
    id: "settings-tab"
- tapOn:
    id: "language-en"
- tapOn:
    id: "home-tab"
- assertVisible: "Recent Meals|Daily Progress"