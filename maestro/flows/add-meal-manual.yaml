appId: com.geraldy.macrozone
---
- launchApp
- extendedWaitUntil:
    visible: "nutriFlow|Add Meal|Ajouter un repas"
    timeout: 20000
- tapOn:
    id: "add-meal-tab"
- tapOn:
    id: "meal-name-input"
- eraseText
- inputText: "Salade Cesar"
- tapOn:
    id: "meal-calories-input"
- eraseText
- inputText: "450"
- hideKeyboard
- tapOn:
    id: "add-meal-submit"
- extendedWaitUntil:
    visible: "Success|Succès|Meal added|Repas ajouté"
    timeout: 8000
- tapOn: "OK"
- tapOn:
    id: "all-meals-tab"
- assertVisible: "Salade Cesar"