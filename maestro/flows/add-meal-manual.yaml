appId: com.geraldy.macrozone
---
- launchApp
- extendedWaitUntil:
    visible: "nutriFlow|MacroZone|Add Meal|Ajouter un repas"
    timeout: 20000
- tapOn:
    id: "add-meal-tab"
- tapOn:
    id: "meal-name-input"
- eraseText
- inputText: "Salade Cesar"
- tapOn:
    id: "meal-calories-input"
- eraseText
- inputText: "450"
- hideKeyboard
- tapOn:
    id: "add-meal-submit"
- tapOn:
    text: "OK"
    optional: true
- tapOn:
    id: "home-tab"
- extendedWaitUntil:
    visible: "Salade Cesar"
    timeout: 10000