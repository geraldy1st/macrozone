appId: com.geraldy.macrozone
---
- launchApp
- extendedWaitUntil:
    visible: "Bienvenue|Welcome|nutriFlow"
    timeout: 20000
- runFlow:
    when:
      visible: "Continuer en tant qu'invité|Continue as guest"
    commands:
      - tapOn:
          id: "welcome-guest-btn"
- extendedWaitUntil:
    visible: "nutriFlow|Add Meal|Ajouter un repas"
    timeout: 20000
- tapOn:
    id: "add-meal-tab"
- tapOn:
    id: "meal-name-input"
- eraseText
- inputText: "Salade Cesar"
- tapOn:
    id: "meal-calories-input"
- eraseText
- inputText: "450"
- hideKeyboard
- tapOn:
    id: "add-meal-submit"
- extendedWaitUntil:
    visible: "Meal added successfully|Repas ajouté avec succès"
    timeout: 8000
- tapOn:
    id: "all-meals-tab"
- assertVisible: "Salade Cesar"